# nginx.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: nginx
    namespace: argocd
spec:
    project: default
    source:
        repoURL: 'https://github.com/julioraulcarranzaruiz/gitops-app.git'
        path: manifest
        targetRevision: master
    destination:
        server: 'https://kubernetes.default.svc'
        namespace: default
    syncPolicy:
        automated:
            selfHeal: true
            prune: true